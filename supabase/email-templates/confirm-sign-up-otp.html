<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your CoreLife signup</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f3f4ff;
      font-family: Arial, sans-serif;
      color: #1f2937;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellspacing="0"
      cellpadding="0"
      style="padding: 24px 12px"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellspacing="0"
            cellpadding="0"
            style="
              max-width: 560px;
              background: #ffffff;
              border-radius: 16px;
              padding: 32px 24px;
              box-shadow: 0 12px 34px rgba(31, 41, 55, 0.08);
            "
          >
            <tr>
              <td
                style="
                  font-size: 12px;
                  letter-spacing: 0.08em;
                  text-transform: uppercase;
                  color: #64748b;
                  font-weight: 700;
                "
              >
                CoreLife
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding-top: 12px;
                  font-size: 28px;
                  line-height: 1.25;
                  font-weight: 700;
                  color: #111827;
                "
              >
                Confirm your signup
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding-top: 12px;
                  font-size: 16px;
                  line-height: 1.6;
                  color: #374151;
                "
              >
                Use this one-time code to finish creating your account:
              </td>
            </tr>
            <tr>
              <td style="padding-top: 18px">
                <div
                  style="
                    display: inline-block;
                    padding: 14px 20px;
                    border-radius: 12px;
                    background: #eef2ff;
                    border: 1px solid #c7d2fe;
                    font-size: 30px;
                    letter-spacing: 0.16em;
                    font-weight: 700;
                    color: #1e3a8a;
                  "
                >
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding-top: 14px;
                  font-size: 14px;
                  line-height: 1.6;
                  color: #6b7280;
                "
              >
                This code expires soon. If you did not request this, you can
                ignore this email.
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding-top: 20px;
                  font-size: 14px;
                  line-height: 1.6;
                  color: #4b5563;
                "
              >
                Having trouble with the code screen? You can also confirm
                directly:
                <a href="{{ .ConfirmationURL }}" style="color: #2563eb"
                  >Confirm my email</a
                >
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding-top: 24px;
                  font-size: 12px;
                  line-height: 1.5;
                  color: #94a3b8;
                "
              >
                Sent by CoreLife for {{ .Email }}.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
